<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Snap Image Compress</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "primary": "#4C8CFF",
          "on-primary": "#FFFFFF",
          "primary-container": "#E8F0FE",
          "on-primary-container": "#1967D2",
          "secondary-container": "#F1F3F4",
          "on-secondary-container": "#202124",
          "background": "#FAFAFA",
          "on-background": "#000000",
          "surface": "#FFFFFF",
          "on-surface": "#000000",
          "surface-variant": "#F1F3F4",
          "on-surface-variant": "#5F6368",
          "outline": "#DADCE0"
        },
        fontFamily: {
          "sans": ["Google Sans", "sans-serif"]
        },
        borderRadius: {
          "3xl": "28px"
        }
      }
    }
  }
</script>
<style>
  body {
    background-image: radial-gradient(circle at 1px 1px, rgba(0, 0, 0, 0.05) 1px, transparent 0);
    background-size: 24px 24px;
    min-height: max(884px, 100dvh);
  }
</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-sans text-on-background flex flex-col overflow-x-hidden relative min-h-screen">
<header class="flex flex-col gap-2 p-4 pt-12 sticky top-0 z-10 bg-background/90 backdrop-blur-md">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/50 transition-colors text-on-surface self-start">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="text-[32px] font-bold tracking-tight text-on-background mt-2">Image Compress</h1>
</header>
<main class="flex-1 px-4 pt-4 pb-32 space-y-10 max-w-md mx-auto w-full">
<section>
<div class="bg-secondary-container rounded-3xl p-6 flex flex-col items-center justify-center gap-4 shadow-sm border border-outline/30 relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-white/60 to-transparent pointer-events-none"></div>
<div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm text-primary z-10">
<span class="material-symbols-outlined text-[32px]">image</span>
</div>
<div class="text-center z-10">
<p class="text-sm font-semibold text-on-secondary-container">Source: photo_raw.jpg</p>
<p class="text-xs font-medium text-on-surface-variant mt-1">12 MB</p>
</div>
</div>
</section>
<section class="space-y-4">
<div class="flex items-center justify-between px-1">
<h2 class="text-[15px] font-semibold text-on-surface">File Size</h2>
<span class="text-sm font-bold text-primary">4 MB</span>
</div>
<div class="px-2 pb-2">
<input class="w-full h-2 bg-surface-variant rounded-lg appearance-none cursor-pointer accent-primary focus:outline-none focus:ring-2 focus:ring-primary/50" max="12" min="0.5" step="0.5" type="range" value="4">
<div class="flex justify-between text-[11px] text-on-surface-variant mt-3 px-1 font-medium">
<span class="">500 KB</span>
<span class="">12 MB</span>
</div>
</div>
</section>
<section class="space-y-4">
<h2 class="text-[15px] font-semibold px-1 text-on-surface">Presets</h2>
<div class="flex flex-wrap gap-2">
<button class="bg-surface border border-outline rounded-full py-2 px-4 flex items-center gap-2 hover:bg-surface-variant/30 active:scale-95 transition-all">
<span class="text-[14px] font-medium text-on-surface">Profile</span>
<span class="text-[12px] text-on-surface-variant font-medium">(1 MB)</span>
</button>
<button class="bg-primary-container border border-primary/20 rounded-full py-2 px-4 flex items-center gap-2 active:scale-95 transition-all">
<span class="material-symbols-outlined text-[18px] text-primary">check</span>
<span class="text-[14px] font-medium text-on-primary-container">Email</span>
<span class="text-[12px] text-primary font-medium">(2 MB)</span>
</button>
<button class="bg-surface border border-outline rounded-full py-2 px-4 flex items-center gap-2 hover:bg-surface-variant/30 active:scale-95 transition-all">
<span class="text-[14px] font-medium text-on-surface">Social</span>
<span class="text-[12px] text-on-surface-variant font-medium">(4 MB)</span>
</button>
</div>
</section>
<section class="bg-surface rounded-xl p-5 border border-outline shadow-sm space-y-5">
<h3 class="text-[15px] font-semibold text-on-surface">Advanced Options</h3>
<div class="flex items-center justify-between">
<div>
<p class="text-[14px] font-medium text-on-surface">Format</p>
<p class="text-[12px] text-on-surface-variant mt-0.5">Select output format</p>
</div>
<select class="bg-surface-variant border-none rounded-lg text-[13px] font-medium text-on-surface py-2 pl-3 pr-8 focus:ring-1 focus:ring-primary">
<option>JPEG</option>
<option>PNG</option>
<option>WEBP</option>
</select>
</div>
<div class="flex items-center justify-between">
<div>
<p class="text-[14px] font-medium text-on-surface">Remove Metadata</p>
<p class="text-[12px] text-on-surface-variant mt-0.5">Strip EXIF and location data</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox">
<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</section>
</main>
<div class="fixed bottom-0 left-0 w-full p-4 bg-background z-20 pb-8">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary text-on-primary h-[56px] rounded-full font-bold text-[16px] shadow-sm hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">compress</span>
Compress Image
</button>
</div>
</div>
</body></html>
